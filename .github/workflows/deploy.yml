name: Deploy Code Changes
on:
  push:
    branches: [ main ]
    paths:
      - 'code/**'

jobs:
  deploy_code:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Python
        run: |
          pyflakes3 ${{ github.workspace }}/code/

      - name: Deploy Services
        run: |
          cd /million-project
          rsync -av --include='code/***' --include='docker-compose.yml' --exclude='*' ${{ github.workspace }}/ /million-project/   
          docker compose up -d --build --force-recreate logic_engine

      - name: Verify deployment
        run: |
          sleep 5
          docker inspect --format='{{.State.Status}}' logic_engine | grep -q "^running$" || \
          (echo "Container failed to start!" && docker logs logic_engine --tail 20 && exit 1)

name: Deploy Docker Compose Changes
on:
  push:
    branches: [ main ]
    paths:
      - 'docker-compose.yml'

jobs:
  deploy_docker:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Services
        run: |
          cd /million-project
          rsync -av --include='code/***' --include='docker-compose.yml' --exclude='*' ${{ github.workspace }}/ /million-project/   
          docker-compose down && docker-compose up -d --build --force-recreate

      - name: Verify deployment
        run: |
          sleep 5
          cd /million-project
          CONTAINERS=$(docker-compose ps -q)
          if [ -z "$CONTAINERS" ]; then
            echo "No containers found! Did docker-compose up fail?"
            exit 1
          fi
          FAILED=$(echo "$CONTAINERS" | xargs docker inspect --format='{{.Name}}: {{.State.Status}}' | grep -v "running" || true)
          if [ -n "$FAILED" ]; then
            echo "The following containers failed to start: $FAILED"
            docker-compose logs --tail 100
            exit 1
          fi
          echo "All compose services are running successfully."