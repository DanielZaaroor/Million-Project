name: Deploy Project
on:
  push:
    branches: [ main ]
    paths:
      - 'code/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files: docker-compose.yml

      - name: Lint Python
        run: |
          pyflakes3 ${{ github.workspace }}/code/

      - name: Deploy Services
        run: |
          cd /million-project
          rsync -av --include='code/***' --include='docker-compose.yml' --exclude='*' ${{ github.workspace }}/ /million-project/   
          
          if [ "${{ steps.changes.outputs.any_changed }}" == "true" ]; then
            echo "Docker Compose file changed. Restarting all services..."
            docker-compose down && docker-compose up -d --build --force-recreate
          else
            echo "Only code changed. Restarting logic_engine..."
            docker compose up -d --build --force-recreate logic_engine
          fi

      - name: Verify deployment
        run: |
          sleep 5
          cd /million-project
          CONTAINERS=$(docker-compose ps -q)
          if [ -z "$CONTAINERS" ]; then
            echo "No containers found! Did docker-compose up fail?"
            exit 1
          fi
          FAILED=$(echo "$CONTAINERS" | xargs docker inspect --format='{{.Name}}: {{.State.Status}}' | grep -v "running" || true)
          if [ -n "$FAILED" ]; then
            echo "The following containers failed to start: $FAILED"
            docker-compose logs --tail 100
            exit 1
          fi
          echo "All compose services are running successfully."
