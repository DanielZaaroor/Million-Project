name: Deploy Million Project
on:
  push:
    branches: [ main ]
    paths:
      - 'code/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Python
        run: |
          pyflakes3 ${{ github.workspace }}/code/

      - name: Deploy Services
        run: |
          cd /million-project
          rsync -av --exclude='.github/' --exclude='.env' --exclude='code/data/' --exclude='send_wuzapi' ${{ github.workspace }}/ /million-project/   
          docker compose up -d --build --force-recreate logic_engine

      - name: Verify deployment
        run: |
          sleep 5
          docker inspect --format='{{.State.Status}}' logic_engine | grep -q "^running$" || \
          (echo "Container failed to start!" && docker logs logic_engine --tail 20 && exit 1)
